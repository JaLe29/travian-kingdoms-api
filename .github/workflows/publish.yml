name: Publish to npm

# Publishes the package to the npm registry whenever a GitHub Release is
# published. Create a release (with a tag such as `v2.0.0`) and this workflow
# builds, tests and publishes the compiled package automatically.
#
# Authentication uses npm Trusted Publishing (OIDC) — there is NO long-lived
# NPM_TOKEN to store or rotate. A short-lived, workflow-scoped token is minted
# for each run. This requires a one-time setup on npmjs.com: on the package
# page go to Settings → Trusted Publishers and add this repository and the
# `publish.yml` workflow file.
#
# It can also be triggered manually from the Actions tab (workflow_dispatch).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) and provenance

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, type-check, test) & build
        run: |
          npm run lint
          npm run typecheck
          npm run test:run
          npm run build

      - name: Publish to npm
        run: npm publish --access public
